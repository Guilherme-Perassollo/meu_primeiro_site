<!DOCTYPE html>
<html>
<title>contato.html</title>
<head>
<h1>Formulário de contato</h1>        
</head>
<body>
<form>
    <strong><label for="nome">Nome:</label></strong><br>
    <input type="text" id="nome" name="nome" required>
    <br><br>

    <strong><label for="email">Email:</label></strong><br>
    <input type="email" id="email" name="email" required>
    <br><br>

    <strong><label for="telefone">Telefone:</label></strong><br>
    <input type="tel" id="telefone" name="telefone" required>
    <br><br>

    <strong><label for="assunto">Assunto:</label></strong><br>
    <textarea placeholder="Digite o assunto aqui..." id="assunto" name="Assunto"></textarea>
    <br><br>

    <strong><label>Sua mensagem:</label></strong><br>
    <textarea placeholder="Digite sua mensagem aqui..." id="mensagem_contato" name="Mensagem"></textarea><br>
    <br><br>

    <input type="checkbox" id="termos" name="termos" required>
    <label for="termos">Aceito os</label> <a href="#">Termos de uso</a>
    <br><br>

    <button>Enviar</button>
</form>
</body>
</html>
